<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Registro Gestor</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5">
    <div class="card shadow border-0 rounded-4">
    <div class="card-body p-5">
        <h2 class="mb-4">Registro Gestor Inmobiliario Free</h2>
        <div class="row g-3">
        <div class="col-md-6"><input class="form-control" placeholder="RUT"></div>
        <div class="col-md-6"><input class="form-control" placeholder="Nombre completo"></div>
        <div class="col-md-6"><input type="date" class="form-control"></div>
        <div class="col-md-6"><input type="email" class="form-control" placeholder="Correo electrónico"></div>
        <div class="col-md-6"><input type="password" class="form-control" placeholder="Contraseña"></div>
        <div class="col-md-6">
            <select class="form-select">
            <option>Sexo</option>
            <option>Masculino</option>
            <option>Femenino</option>
            <option>Prefiero no decirlo</option>
            </select>
        </div>
        <div class="col-md-6"><input class="form-control" placeholder="Teléfono móvil"></div>
        <div class="col-md-6"><input type="file" class="form-control" accept=".pdf,.jpg,.png"></div>
        </div>
        <button class="btn btn-dark mt-4">Postular como Gestor</button>
    </div>
    </div>
</div>
</body>
</html>
